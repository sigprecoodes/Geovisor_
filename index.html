<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoRutas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="app-container app-shell">
    <div class="app-background" aria-hidden="true">
      <div class="bg-grid bg-grid-sm"></div>
      <div class="bg-grid bg-grid-lg"></div>
      <span class="bg-orb bg-orb-1"></span>
      <span class="bg-orb bg-orb-2"></span>
      <span class="bg-orb bg-orb-3"></span>
    </div>

    <header class="main-header">
      <div class="header-brand">
        <div class="brand-copy">
          <img
            src="assets/img/logo.png"
            alt="Geovisor"
            style="max-width:250px; width:100%; height:auto; display:block; margin-bottom:4px;"
          />
          <h1 style="display:none;">
            <i class="fas fa-map-marked-alt"></i> Geovisor
          </h1>
          <p class="header-note">
            <strong>Visor de consulta</strong>.
          </p>
        </div>
      </div>

      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-label">Pendiente</span>
          <span class="stat-value" id="pending-routes">0</span>
        </div>

        <div class="stat-item">
          <span class="stat-label">En proceso</span>
          <span class="stat-value" id="in-progress">0</span>
        </div>

        <div class="stat-item">
          <span class="stat-label">Ejecutadas</span>
          <span class="stat-value" id="completed">0</span>
        </div>

        <div class="stat-item">
          <span class="stat-label">Reportadas con novedad</span>
          <span class="stat-value" id="reported-issues">0</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="map-container">
        <div id="map"></div>

        <button id="toggle-layers" class="mobile-fab" title="Capas" type="button">
          <i class="fas fa-layer-group"></i>
          <span>Capas</span>
        </button>

        <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

        <aside class="sidebar floating-card" id="sidebar">
          <div class="sidebar-header">
            <div class="section-heading">
              <h3><i class="fas fa-layer-group"></i> Capas disponibles</h3>
              <p class="sidebar-subtitle">
                Filtre por estado o busque una microrruta/lote.
              </p>
            </div>

            <div class="sidebar-actions">
              <button id="refresh-data" class="btn-refresh" title="Recargar datos" type="button">
                <i class="fas fa-sync-alt"></i>
              </button>

              <button id="close-sidebar" class="btn-refresh btn-mobile-close" title="Cerrar capas" type="button">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <div class="search-section section-card">
            <h4><i class="fas fa-search"></i> Buscar</h4>

            <div class="search-box">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                id="search-input"
                placeholder="Buscar por lote o microrruta"
                autocomplete="off"
              />
              <button
                id="clear-search"
                class="clear-search hidden"
                type="button"
                title="Limpiar búsqueda"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <div class="filters-section section-card">
            <h4><i class="fas fa-filter"></i> Estado</h4>

            <div class="filter-options">
              <label><input type="checkbox" value="Pendiente" checked /> <span>Pendiente</span></label>
              <label><input type="checkbox" value="En proceso" checked /> <span>En proceso</span></label>
              <label><input type="checkbox" value="Ejecutado" checked /> <span>Ejecutado</span></label>
              <label><input type="checkbox" value="Ejecutado con novedad" checked /> <span>Ejecutado con novedad</span></label>
              <label><input type="checkbox" value="No ejecutado con novedad" checked /> <span>No ejecutado con novedad</span></label>
            </div>
          </div>
        </aside>

        <aside id="info-panel" class="info-panel floating-card hidden">
          <div class="panel-header">
            <div class="section-heading">
              <h3><i class="fas fa-info-circle"></i> Detalle</h3>
              <p class="panel-subtitle">
                Consulta en el visor y abre el editor para modificar.
              </p>
            </div>

            <button id="close-panel" class="btn-close" title="Cerrar panel" type="button">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <div id="panel-content" class="panel-content">
            <div class="empty-panel">
              Seleccione una microrruta en el mapa.
            </div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
